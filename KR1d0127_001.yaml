body:
  text: 禮記范氏音曲禮下主佩倚於綺反陸德明釋文月令則蝗蟲為災蝗音橫郊特牲帝牛必在滌三月滌音迪並同上樂記而卵生者不殈音溢釋文戈質切鳥卵坼也集韻入聲五質殈字注喪大記幠用斂衾幠起呂反注同釋文中庸一卷石之多卷羌阮反注同釋文集韻上聲二十阮苦遠切卷區也引禮云范宣讀表記憃而愚憃陽江反又丁終反釋文在小人則穿窬之盜也與窬羊朱反問喪悲哀志悶氣盛悶音悶下同服問有從輕而重從才用反並同上大學於戲音羲釋文引徐范身有所忿懥音稚釋文
